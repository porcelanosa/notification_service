services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notification_net

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - notification_net

  worker_critical:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work rabbitmq --queue=notifications.critical --tries=3 --timeout=60
    volumes:
      - ./src:/var/www/html
    depends_on:
      - app
    networks:
      - notification_net

  worker_bulk:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work rabbitmq --queue=notifications.bulk --tries=3 --timeout=120
    volumes:
      - ./src:/var/www/html
    depends_on:
      - app
    networks:
      - notification_net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres_db_user
      POSTGRES_PASSWORD: qwerty123!wq
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_db_user -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - notification_net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq_user
      RABBITMQ_DEFAULT_PASS: qwerty123!wq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - notification_net

  redis:
    image: redis:7-alpine
    command: redis-server --bind 0.0.0.0 --requirepass qwerty123!wq
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - notification_net

volumes:
  pg_data:

networks:
  notification_net:
    driver: bridge